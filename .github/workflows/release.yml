name: Build and deploy

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}

permissions:
  packages: write
  contents: write

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Install Nix
      shell: bash
      run: |
        if [[ -z $(command -v nix) ]]; then
          curl --proto '=https' --tlsv1.2 -sSf -L https://install.lix.systems/lix | sh -s -- install --no-confirm --extra-conf "
            trusted-users = $(whoami)
            access-tokens = github.com=$GITHUB_TOKEN
          "
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Restore and cache Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 1073741824
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never

    - name: Build container image
      shell: bash
      run: |
        nix build .#container

    - name: Deploy to fly.io
      shell: bash
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        # We manually publish the image to avoid having to rewrite the tag
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./result \
          docker://registry.fly.io/linkleaner:latest \
          --dest-creds x:"$FLY_API_TOKEN" \
          --format v2s2
        nix run .#flyctl deploy

